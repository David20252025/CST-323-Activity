<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/site.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Tasks</h1>
        <a class="btn btn-primary" th:href="@{/tasks/new}">Create Task</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <form class="row g-2 mb-3" method="get" th:action="@{/tasks}">
        <div class="col-md-4">
            <select name="status" class="form-select">
                <option value="">All statuses</option>

                <option th:each="status : ${statuses}"
                        th:value="${status}"
                        th:selected="${status == selectedStatus}"
                        th:text="${status.displayName}">
                </option>
            </select>
        </div>

        <div class="col-auto">
            <button class="btn btn-outline-primary" type="submit">Filter</button>
        </div>

        <div class="col-auto">
            <a class="btn btn-outline-secondary" th:href="@{/tasks}">Clear</a>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Status</th>
                <th>Priority</th>
                <th>Due Date</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.id}">1</td>
                <td th:text="${task.title}">Example task</td>

                <td>
                    <span class="badge text-bg-secondary" th:text="${task.status.displayName}">
                        Not Started
                    </span>
                </td>

                <td th:text="${task.priority.displayName}">Medium</td>
                <td th:text="${task.dueDate}">2026-01-01</td>

                <td class="text-end">
                    <a class="btn btn-sm btn-outline-info"
                       th:href="@{/tasks/{id}(id=${task.id})}">
                        View
                    </a>

                    <a class="btn btn-sm btn-outline-primary"
                       th:href="@{/tasks/{id}/edit(id=${task.id})}">
                        Edit
                    </a>

                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}"
                          method="post"
                          class="d-inline"
                          onsubmit="return confirm('Delete this task?');">
                        <button class="btn btn-sm btn-outline-danger" type="submit">
                            Delete
                        </button>
                    </form>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="6" class="text-center text-muted">
                    No tasks found.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
