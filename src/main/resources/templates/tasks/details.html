<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Task Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/site.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <h1>Task Details</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="card-title" th:text="${task.title}">Task title</h3>

            <p class="card-text" th:text="${task.description}">
                Task description
            </p>

            <p>
                <strong>Status:</strong>
                <span th:text="${task.status.displayName}">Not Started</span>
            </p>

            <p>
                <strong>Priority:</strong>
                <span th:text="${task.priority.displayName}">Medium</span>
            </p>

            <p>
                <strong>Due Date:</strong>
                <span th:text="${task.dueDate}">2026-01-01</span>
            </p>

            <p>
                <strong>Created:</strong>
                <span th:text="${task.createdAt}">Created date</span>
            </p>

            <p>
                <strong>Updated:</strong>
                <span th:text="${task.updatedAt}">Updated date</span>
            </p>

            <a class="btn btn-primary"
               th:href="@{/tasks/{id}/edit(id=${task.id})}">
                Edit
            </a>

            <a class="btn btn-secondary"
               th:href="@{/tasks}">
                Back to List
            </a>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
