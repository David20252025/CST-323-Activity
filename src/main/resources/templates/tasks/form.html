<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${task.id == null ? 'Create Task' : 'Edit Task'}">Task Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/site.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <h1 th:text="${task.id == null ? 'Create Task' : 'Edit Task'}">Task Form</h1>

    <form method="post"
          th:object="${task}"
          th:action="${task.id == null} ? @{/tasks} : @{/tasks/{id}(id=${task.id})}"
          class="card p-4 shadow-sm">

        <div class="mb-3">
            <label for="title" class="form-label">Title</label>

            <input id="title"
                   type="text"
                   class="form-control"
                   th:field="*{title}"
                   placeholder="Enter task title">

            <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">
                Title error
            </div>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description</label>

            <textarea id="description"
                      class="form-control"
                      rows="4"
                      th:field="*{description}"
                      placeholder="Enter task description"></textarea>

            <div class="text-danger" th:if="${#fields.hasErrors('description')}" th:errors="*{description}">
                Description error
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="status" class="form-label">Status</label>

                <select id="status" class="form-select" th:field="*{status}">
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status.displayName}">
                    </option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label for="priority" class="form-label">Priority</label>

                <select id="priority" class="form-select" th:field="*{priority}">
                    <option th:each="priority : ${priorities}"
                            th:value="${priority}"
                            th:text="${priority.displayName}">
                    </option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label for="dueDate" class="form-label">Due Date</label>

                <input id="dueDate"
                       type="date"
                       class="form-control"
                       th:field="*{dueDate}">
            </div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-success" type="submit">
                Save
            </button>

            <a class="btn btn-secondary" th:href="@{/tasks}">
                Cancel
            </a>
        </div>
    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
