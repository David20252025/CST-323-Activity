<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Activity Task Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/site.css}" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container">
    <section class="p-5 bg-light rounded shadow-sm">
        <h1 class="mb-3">Activity Task Manager</h1>

        <p class="lead">
            This cloud test application demonstrates Spring Boot, MySQL, Bootstrap,
            Thymeleaf, Git, logging, and full CRUD functionality.
        </p>

        <p>
            Total tasks currently stored in the database:
            <strong th:text="${taskCount}">0</strong>
        </p>

        <a class="btn btn-primary" th:href="@{/tasks}">View Tasks</a>
        <a class="btn btn-success" th:href="@{/tasks/new}">Create Task</a>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
